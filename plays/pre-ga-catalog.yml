---
- name: Check if IDMS is supported
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: imagedigestmirrorsets.config.openshift.io
  register: idms_res

- name: "Get Pre-GA catalog digest from reference"
  ansible.builtin.set_fact:
    dci_pre_ga_catalog_resolved: >-
      {{
        (dci_pre_ga_catalog | regex_replace('^docker://', '') | split('@') | first)
        ~ '@' ~
        (dci_pre_ga_catalog | regex_replace('^docker://', '') | split('@') | last | trim)
      }}
  when:
    - dci_local_registry is defined
    - dci_pre_ga_catalog is defined
    - dci_pre_ga_catalog is search('@sha[0-9]+:')

- name: "Inspect Pre-GA catalog image to get digest when reference has a tag"
  ansible.builtin.command: >
    skopeo inspect
    --no-tags
    {% if dci_pullsecret_file is defined %}
    --authfile {{ dci_pullsecret_file }}
    {% endif %}
    {%- if dci_pre_ga_catalog_allow_insecure | default(true) | bool %}
    --tls-verify=false
    {%- endif %}
    --format '{{ "{{" }} .Digest {{ "}}" }}'
    docker://{{ dci_pre_ga_catalog | regex_replace('^docker://', '') }}
  register: _skopeo_prega_catalog
  changed_when: false
  retries: 3
  delay: 10
  until: _skopeo_prega_catalog.rc == 0
  when:
    - dci_local_registry is defined
    - dci_pre_ga_catalog is defined
    - not (dci_pre_ga_catalog is search('@sha[0-9]+:'))

- name: "Set Pre-GA catalog image@digest"
  ansible.builtin.set_fact:
    dci_pre_ga_catalog_digest: >-
      {{
        (dci_pre_ga_catalog | regex_replace('^docker://', '') | regex_replace(':[^:@]+$', ''))
        ~ '@' ~
        (_skopeo_prega_catalog.stdout | trim)
      }}
  when:
    - not (dci_pre_ga_catalog is search('@sha[0-9]+:'))
    - _skopeo_prega_catalog is defined
    - _skopeo_prega_catalog.rc == 0

- name: Mirror Pre-GA latest operators
  ansible.builtin.include_role:
    name: redhatci.ocp.oci_mirror
  vars:
    om_target_versions: "latest"
    om_source_index: "{{ dci_pre_ga_catalog }}"
    om_target: "{{ dci_local_registry }}"
    om_allow_insecure_registries: true
    om_auths_file: "{{ dci_pullsecret_file }}"
  when:
    - dci_local_registry is defined
    - dci_disconnected | default(false) | bool

# om_output_dir manifests are not usable here, so we remove the directory.
- name: Remove oc-mirror output directory
  ansible.builtin.file:
    path: "{{ om_output_dir }}"
    state: absent
  when: om_output_dir is defined

- name: Append the Pre-GA catalog to the list of custom catalogs
  ansible.builtin.set_fact:
    custom_catalogs: "{{ custom_catalogs | default([]) + [dci_pre_ga_catalog_digest] }}"

- name: "Apply pre-ga IDMS from template"
  vars:
    prega_mirror: "{{ dci_disconnected | default(false) | bool |
                ternary (dci_local_registry,
                'quay.io') }}"
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'pre-ga-idms.j2') }}"

- name: Get differences between GA and daily Pre-GA
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ dci_cluster_configs_dir }}:/sbin:/usr/sbin:/usr/local/bin/"
  vars:
    ga_version: "{{ dci_pre_ga_catalog | regex_findall(':(v\\d+\\.\\d+)') | first }}"
    ga_index: registry.redhat.io/redhat/redhat-operator-index:{{ ga_version }}
    compare_script: plays/scripts/compare-indexes.sh
  ansible.builtin.shell: >
    set -x;
    {{ compare_script }} {{ ga_index }} {{ dci_pre_ga_catalog }} >
    {{ job_logs.path }}/ga-prega-versions.txt
  register: compare_result
  until: compare_result.rc == 0
  retries: 3
  delay: 10
  delegate_to: localhost
...
